name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar APK
        run: gradle --no-daemon assembleDebug

      - name: Preparar arquivo
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/debug/app-debug.apk artifact/Anki-Arquivologia.apk

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Anki-Arquivologia-APK
          path: artifact/Anki-Arquivologia.apk
          if-no-files-found: error
